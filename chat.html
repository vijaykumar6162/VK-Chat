<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#007bff;
color:white;
padding:15px;
font-size:20px;
}

.chatbox{
height:400px;
overflow-y:auto;
padding:10px;
background:white;
}

.msg{
background:#007bff;
color:white;
padding:10px;
margin:5px;
border-radius:10px;
width:fit-content;
}

.bottom{
display:flex;
padding:10px;
background:white;
}

input{
flex:1;
padding:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
}

</style>

</head>
<body>

<div class="header">
💬 VK Chat
</div>

<div class="chatbox" id="chatbox">
</div>

<div class="bottom">

<input type="text" id="msg">

<button onclick="sendMsg()">
Send
</button>

</div>

<script>

function sendMsg(){

let text=document.getElementById("msg").value;

if(text==="") return;

let div=document.createElement("div");

div.className="msg";

div.innerText=text;

document.getElementById("chatbox").appendChild(div);

document.getElementById("msg").value="";

}

</script>

</body>
</html>
